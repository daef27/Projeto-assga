{% extends 'associacao/base.html' %}
{% load static %}

{% block title %}Login{% endblock %}

{% block content %}

<style>

body{
background:linear-gradient(135deg,#003366,#0d6efd,#00c6ff);
min-height:100vh;
}


/* CARD LOGIN */

.card-login{
max-width:420px;
margin:50px auto;
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
animation:fade 0.6s ease;
}


/* ANIMAÇÃO */

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}


.card-login h2{
text-align:center;
margin-bottom:25px;
color:#003366;
}


/* INPUT */

.input-group{
margin-bottom:18px;
}

.input-group label{
font-size:14px;
color:#555;
}

.input-group input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
margin-top:5px;
transition:0.3s;
}

.input-group input:focus{
outline:none;
border-color:#0d6efd;
box-shadow:0 0 8px rgba(13,110,253,0.2);
}


/* BOTÃO */

.btn-login{
width:100%;
padding:12px;
background:linear-gradient(90deg,#0d6efd,#0055aa);
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
font-size:15px;
transition:0.3s;
}

.btn-login:hover{
transform:translateY(-2px);
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}


/* ERRO */

.erro{
background:#f8d7da;
color:#842029;
padding:12px;
border-radius:8px;
margin-bottom:15px;
text-align:center;
font-weight:500;
}


/* LOGO */

.logo-login{
text-align:center;
margin-bottom:15px;
}

.logo-login img{
height:70px;
}


/* RESPONSIVO */

@media(max-width:600px){

.card-login{
margin:20px;
padding:25px;
}

}

</style>


<div class="card-login">

<div class="logo-login">
<img src="{% static 'images/assga-logo.png' %}">
</div>

<h2>🔐 Login do Sócio</h2>

{% if erro %}
<div class="erro">
{{ erro }}
</div>
{% endif %}

<form method="POST">
{% csrf_token %}

<div class="input-group">
<label>CPF</label>
<input type="text" name="cpf" placeholder="Digite seu CPF" required>
</div>

<div class="input-group">
<label>Senha</label>
<input type="password" name="senha" placeholder="Digite sua senha" required>
</div>

<button type="submit" class="btn-login">
Entrar
</button>

</form>

</div>

{% endblock %}
