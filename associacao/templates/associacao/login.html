{% extends 'associacao/base.html' %}

{% block title %}Login{% endblock %}

{% block content %}

<style>

.login-box{
max-width:400px;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.login-box h2{
text-align:center;
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ddd;
}

.login-box button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#0048ff,#00c6ff);
color:white;
font-weight:bold;
cursor:pointer;
}

</style>

<div class="login-box">

<h2>🔐 Login Admin</h2>

<form method="post">
{% csrf_token %}

<input type="text" name="username" placeholder="Usuário">

<input type="password" name="password" placeholder="Senha">

<button type="submit">Entrar</button>

</form>

</div>

{% endblock %}
